<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Comprehensive interception of WebSocket and unhandled Vite development connection errors
      (() => {
        const isViteWSMessage = (msg) => {
          if (!msg) return false;
          const str = String(msg);
          return str.includes('WebSocket') || 
                 str.includes('vite') || 
                 str.includes('websocket') ||
                 str.includes('connection failed') ||
                 str.includes('closed without opened');
        };

        // Globally intercept and mock Vite dev-server WebSocket requests to prevent errors at the root level
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          class MockWebSocket extends EventTarget {
            constructor(url, protocols) {
              super();
              this.url = url;
              this.protocols = protocols;
              this.readyState = 0; // CONNECTING
              this.onopen = null;
              this.onclose = null;
              this.onerror = null;
              this.onmessage = null;

              // Transition to OPEN state smoothly and trigger 'open' event
              setTimeout(() => {
                this.readyState = 1; // OPEN
                const openEvent = new Event('open');
                this.dispatchEvent(openEvent);
                if (typeof this.onopen === 'function') {
                  try { this.onopen(openEvent); } catch (e) {}
                }
              }, 50);
            }

            send(data) {
              // No-op for silent dropping of outgoing logs/heartbeats
            }

            close(code, reason) {
              this.readyState = 3; // CLOSED
              const closeEvent = new Event('close');
              this.dispatchEvent(closeEvent);
              if (typeof this.onclose === 'function') {
                try { this.onclose(closeEvent); } catch (e) {}
              }
            }
          }

          // Attach state constants
          for (const key of ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED']) {
            MockWebSocket[key] = OriginalWebSocket[key];
          }

          window.WebSocket = function(url, protocols) {
            const urlStr = String(url);
            // Check if this WebSocket belongs to Vite client or dev-server configuration
            if (
              urlStr.includes('/vite') || 
              urlStr.includes('localhost') || 
              urlStr.includes('run.app') || 
              urlStr.includes('3000') ||
              urlStr.includes('ais-')
            ) {
              return new MockWebSocket(url, protocols);
            }
            return new OriginalWebSocket(url, protocols);
          };

          // Mimic any additional static properties
          for (const key of Object.getOwnPropertyNames(OriginalWebSocket)) {
            if (!window.WebSocket[key]) {
              try {
                window.WebSocket[key] = OriginalWebSocket[key];
              } catch (e) {}
            }
          }
          window.WebSocket.prototype = OriginalWebSocket.prototype;
        }

        // Silent global event listeners for any stray rejection event from legacy cached bundles
        window.addEventListener('error', (event) => {
          if (event && (
            (event.message && isViteWSMessage(event.message)) ||
            (event.error && event.error.message && isViteWSMessage(event.error.message))
          )) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('unhandledrejection', (event) => {
          if (event && event.reason) {
            const reasonStr = event.reason.toString ? event.reason.toString() : '';
            const reasonMsg = event.reason.message || '';
            if (isViteWSMessage(reasonStr) || isViteWSMessage(reasonMsg)) {
              event.preventDefault();
              event.stopPropagation();
            }
          }
        }, true);

        // Filter out benign development console logs/warnings for WebSocket/Vite
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const joinedArgs = args.join(' ');
          if (isViteWSMessage(joinedArgs)) {
            return;
          }
          originalConsoleError.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
